<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>Hello</header>
    <div class="sidebar">
        <div class="logo">
            <img id="sun-logo" src="sun-logo.svg" alt="Sun logo">
            <h1>Dashboard</h1>
        </div>
        <div class="links">
            <ul>
                <li>

                </li>

                    <img src="profile-icon.svg" alt="Profile icon">

                </li>

                </li>

                </li>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="searchbar-container">
            <form action="">
                <button id="search-button" type="submit">
                    <img id="search-icon" src="search.svg" alt="Search icon">
                </button>
            </form>
            <input type="text" id="searchbox" name="searchquery">
        </div>
        <div class="profile-links">
            <img id="notification-icon" src="notification-on-outline.svg" alt="Notification on icon">
            <div class="bug-profile-pic-container">
                <img id="bug-profile-pic" src="bug.svg" alt="Bug profile pic">
            </div>
            <a id="my-account" href="#"><strong>Morgan Oakley</strong></a>
        </div>
        <div class="profile-banner">
            <p>Banner</p>
        </div>
        <div class="buttons">
            <p>Buttons</p>
        </div>
    </header>
    <div class="sidebar">
        <ul>
            <li>
                <img id="sun-logo" src="sun-logo.svg" alt="Sun logo">
                <h1>Dashboard</h1>
            </li>
            <li id="home-li">
                <img id="home-icon" src="home-icon.svg" alt="Home icon">
                <h2>Home</h2>
            </li>
            <li id="profile-li">
                <img id="profile-icon" src="profile-icon.svg" alt="Profile icon">
                <h2>Profile</h2>
            </li>
            <li id="messages-li">
                <img id="messages-icon" src="messages-icon.svg" alt="Messages icon">
                <h2>Messages</h2>
            </li>
            <li id="history-li">
                <img id="history-icon" src="history-icon.svg" alt="History icon">
                <h2>History</h2>
            </li>
            <li id="tasks-li">
                <img id="tasks-icon" src="tasks-icon.svg" alt="Tasks icon">
                <h2>Tasks</h2>
            </li>
            <li id="communities-li">
                <img id="communities-icon" src="communities-icon.svg" alt="Communities icon">
                <h2>Communities</h2>
            </li>
            <li id="settings-li">
                <img id="settings-icon" src="settings-icon.svg" alt="Settings icon">
                <h2>Settings</h2>
            </li>
            <li id="support-li">
                <img id="support-icon" src="support-icon.svg" alt="Support icon">
                <h2>Support</h2>
            </li>
            <li id="privacy-li">
                <img id="privacy-icon" src="privacy-icon.svg" alt="Privacy icon">
                <h2>Privacy</h2>
            </li>
        </ul>
    </div>
    <div class="main-content">Where</div>
</body>
</html>
